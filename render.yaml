services:
  - type: web
    name: absensi-rapat-django
    env: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn webapp.wsgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: absensi-rapat-django.onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://absensi-rapat-django.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: absensi-rapat-db
          property: connectionString

databases:
  - name: absensi-rapat-db
    databaseName: absensi_rapat
    user: absensi_rapat_user
    plan: free